<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix - Who's Watching?</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/watching.css">
</head>
<body>
    <div class="profiles-page">
        <header class="top-nav">
            <a href="index.html" aria-label="Netflix Home">
                <svg class="nav-logo" viewBox="0 0 111 30">
                    <path d="M105.062 14.28L111 30c-1.75-.25-3.499-.563-5.28-.845l-3.345-8.686-3.437 7.969c-1.687-.282-3.344-.376-5.031-.595l6.031-13.75L94.469 0h5.063l3.062 7.874L105.875 0h5.124l-5.937 14.28zM90.47 0h-4.594v27.25c1.5.094 3.062.156 4.594.343V0zm-8.563 26.937c-4.187-.281-8.375-.53-12.656-.625V0h4.687v21.875c2.688.062 5.375.281 7.969.405v4.657zM64.25 10.657v4.687h-6.406V26H53.22V0h13.125v4.687h-8.5v5.97h6.406zm-18.906-5.97V26.25c-1.563 0-3.156 0-4.688.062V4.687h-4.844V0h14.406v4.687h-4.874zM30.75 15.593c-2.062 0-4.5 0-6.25.095v6.968c2.75-.188 5.5-.406 8.281-.5v4.5c-3.375.218-6.75.437-10.156.625V0H34v4.687h-9.5v6.219c1.875 0 3.75-.031 5.625-.094v4.781h.625zM4.781 12.812v16.156c-1.531.094-3.063.156-4.594.344V0h4.625l6.125 16.719V0h4.531v29.344c-1.469-.125-2.906-.375-4.344-.563L4.781 12.812z"></path>
                </svg>
            </a>
        </header>
        <main class="profiles-area">
            <h1 class="profiles-title">Who's watching?</h1>
            <ul class="profiles-grid">
                <li class="profile-slot">
                    <a href="index.html" class="profile-link">
                        <div class="profile-pic profile-pic-blue"></div>
                        <span class="profile-name">User 1</span>
                    </a>
                </li>
                <li class="profile-slot">
                    <a href="index.html" class="profile-link">
                        <div class="profile-pic profile-pic-pink"></div>
                        <span class="profile-name">User 2</span>
                    </a>
                </li>
                <li class="profile-slot">
                    <a href="index.html" class="profile-link">
                        <div class="profile-pic profile-pic-green"></div>
                        <span class="profile-name">Kids</span>
                    </a>
                </li>
                <li class="profile-slot">
                    <a href="index.html" class="profile-link">
                        <div class="profile-pic profile-pic-add">
                            <svg viewBox="0 0 24 24" width="40" height="40" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm5 11h-4v4h-2v-4H7v-2h4V7h2v4h4v2z"/></svg>
                        </div>
                        <span class="profile-name">Add Profile</span>
                    </a>
                </li>
            </ul>
            <a href="#" class="manage-btn">Manage Profiles</a>
        </main>
    </div>
</body>
</html>

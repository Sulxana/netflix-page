<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Watch Netflix movies & TV shows online or stream right to your smart TV, game console, PC, Mac, mobile, tablet and more.">
    <title>Netflix</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/landing.css">
</head>
<body>
    <header class="top-nav">
        <a href="index.html" aria-label="Netflix Home" class="logo-link">
            <img class="nav-logo" src="assets/logo.svg" alt="">
        </a>
        <div class="nav-btns">
            <div class="lang-box">
                <img class="lang-icon" src="assets/lang.png" alt="">
                <select class="lang-select">
                    <option>English</option>
                </select>
            </div>
            <a href="signin.html" class="btn btn-sm btn-red">Sign In</a>
        </div>
    </header>
    <main>
        <div class="hero-area">
            <div class="hero-bg"></div>
            <section class="splash-inner">
                <div class="hero-box">
                    <h1 class="hero-head">Unlimited movies, TV shows, and more</h1>
                    <h2 class="hero-sub">Starts at EUR 9.39. Cancel anytime.</h2>
                    <form class="cta-form" action="register.html">
                        <h3 class="join-form-title">Ready to watch? Enter your email to create or restart your membership.</h3>
                        <div class="join-form-row">
                            <div class="email-wrap">
                                <input type="email" id="topEmail" class="email-input" placeholder=" " required autocomplete="email">
                                <label for="topEmail" class="email-label">Email address</label>
                            </div>
                            <button type="submit" class="btn btn-lg btn-red start-btn">
                                Get Started
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" class="start-btn-arrow">
                                    <path d="M9.5 5.5L16.5 12L9.5 18.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                            </button>
                        </div>
                    </form>
                </div>
            </section>
            <!-- Curved divider -->
            <div class="arc-wrap">
                <div class="arc-border"></div>
            </div>
        </div>

        <div class="main-wrap">
            <!-- Trending Now -->
            <section class="section position-relative">
                <h2 class="section-title">Trending Now</h2>
                <div class="slider position-relative">
                    <button class="prev-btn" id="prevBtn" aria-label="Slide Left">
                        <svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
                    </button>
                    <div class="movie-list" id="sliderList">
                        <div class="movie-card">
                            <span class="rank-num">1</span>
                            <img src="assets/trending-1.jpg" alt="Trending 1" class="slide-img">
                        </div>
                        <div class="movie-card">
                            <span class="rank-num">2</span>
                            <img src="assets/trending-2.jpg" alt="Trending 2" class="slide-img">
                        </div>
                        <div class="movie-card">
                            <span class="rank-num">3</span>
                            <img src="assets/trending-3.jpg" alt="Trending 3" class="slide-img">
                        </div>
                        <div class="movie-card">
                            <span class="rank-num">4</span>
                            <img src="assets/trending-4.jpg" alt="Trending 4" class="slide-img">
                        </div>
                        <div class="movie-card">
                            <span class="rank-num">5</span>
                            <img src="assets/trending-5.jpg" alt="Trending 5" class="slide-img">
                        </div>
                        <div class="movie-card">
                            <span class="rank-num">6</span>
                            <img src="assets/trending-6.jpg" alt="Trending 6" class="slide-img">
                        </div>
                        <div class="movie-card">
                            <span class="rank-num">7</span>
                            <img src="assets/trending-7.jpg" alt="Trending 7" class="slide-img">
                        </div>
                        <div class="movie-card">
                            <span class="rank-num">8</span>
                            <img src="assets/trending-8.jpg" alt="Trending 8" class="slide-img">
                        </div>
                        <div class="movie-card">
                            <span class="rank-num">9</span>
                            <img src="assets/trending-9.jpg" alt="Trending 9" class="slide-img">
                        </div>
                        <div class="movie-card">
                            <span class="rank-num">10</span>
                            <img src="assets/trending-10.jpg" alt="Trending 10" class="slide-img">
                        </div>
                    </div>
                    <button class="next-btn" id="nextBtn" aria-label="Slide Right">
                        <svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
                    </button>
                </div>
            </section>

        </div>
    </main>
</body>
</html>

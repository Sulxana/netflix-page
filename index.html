<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Watch Netflix movies & TV shows online or stream right to your smart TV, game console, PC, Mac, mobile, tablet and more.">
    <title>Netflix</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/landing.css">
</head>
<body>
    <header class="top-nav">
        <a href="index.html" aria-label="Netflix Home" class="logo-link">
            <img class="nav-logo" src="assets/logo.svg" alt="">
        </a>
        <div class="nav-btns">
            <div class="lang-box">
                <img class="lang-icon" src="assets/lang.png" alt="">
                <select class="lang-select">
                    <option>English</option>
                </select>
            </div>
            <a href="signin.html" class="btn btn-sm btn-red">Sign In</a>
        </div>
    </header>
    <main>
        <div class="hero-area">
            <div class="hero-bg"></div>
            <section class="splash-inner">
                <div class="hero-box">
                    <h1 class="hero-head">Unlimited movies, TV shows, and more</h1>
                    <h2 class="hero-sub">Starts at EUR 9.39. Cancel anytime.</h2>
                    <form class="cta-form" action="register.html">
                        <h3 class="join-form-title">Ready to watch? Enter your email to create or restart your membership.</h3>
                        <div class="join-form-row">
                            <div class="email-wrap">
                                <input type="email" id="topEmail" class="email-input" placeholder=" " required autocomplete="email">
                                <label for="topEmail" class="email-label">Email address</label>
                            </div>
                            <button type="submit" class="btn btn-lg btn-red start-btn">
                                Get Started
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" class="start-btn-arrow">
                                    <path d="M9.5 5.5L16.5 12L9.5 18.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                            </button>
                        </div>
                    </form>
                </div>
            </section>
        </div>
    </main>
</body>
</html>
